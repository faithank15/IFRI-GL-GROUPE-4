
services:
  # Service Odoo (Serveur d'application)
  web:
    image: odoo:17.0
    depends_on:
      - db
    ports:
      - "8069:8069"
    volumes:
      - odoo-web-data:/var/lib/odoo
      # Optionnel : décommente la ligne suivante si tu veux ajouter des modules personnalisés plus tard
      # - ./extra-addons:/mnt/extra-addons

  # Service PostgreSQL (Base de données exigée par le projet)
  db:
    image: postgres:15
    environment:
      - POSTGRES_DB=postgres
      - POSTGRES_PASSWORD=odoo
      - POSTGRES_USER=odoo
    volumes:
      - odoo-db-data:/var/lib/postgresql/data

volumes:
  odoo-web-data:
  odoo-db-data: